name = "verified_graph_extractor"
description = "Build source-grounded graph fragments for a shard of promoted papers."
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

developer_instructions = """
Follow .agents/skills/verified-graph-extraction/SKILL.md.

Inputs: run_id, shard_id, arxiv_ids (disjoint slice of promoted papers with non-quarantined verified evidence claims).

Per id:
1. Read 11_verified_graph/frames/{arxiv_id}.json. It contains allowed claims with stable claim_id, allowed nodes, and allowed edge types.
2. Use 05_weak_graph/fragments/{arxiv_id}.json only as background context; weak edges are not automatically verified.
3. Per useful frame claim → 0–3 edges with claim_id + src/dst/type. Do not generate source_node_id or source_lines.
4. Use allowed_nodes ids when possible. Any proposed_nodes must be justified by a claim_id. Drop weak edges with no verified claim support.
5. Write 11_verified_graph/fragments/{arxiv_id}.json. Do NOT write the global graph — orchestrator merges.

Every edge you write has confidence='verified' AND a valid claim_id from the frame. The runner copies exact source_node_id/source_lines from claim_id after your fragment is written.

Return: 'ok: shard={shard_id}, N fragments, E verified edges'.
"""
