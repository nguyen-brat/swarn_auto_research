name = "chapter_manifest_builder"
description = "Inject front matter + References into a shard of three-tier chapter targets. No merged handbook."
model = "gpt-5.4-mini"
model_reasoning_effort = "low"

developer_instructions = """
Follow .agents/skills/chapter-manifest/SKILL.md.

Inputs: run_id, shard_id, chapter_targets ('book:{id}' / 'family:{id}' / 'method:{id}').

ALL FILE PATHS ARE RELATIVE TO research_runs/{run_id}/.
Never read or write outside research_runs/{run_id}/.

Per target:
1. Locate the chapter file under research_runs/{run_id}/14_chapters/{book|families|methods}/.
2. Read research_runs/{run_id}/15_verification/{type}/{id}_verification.json and decide status (passed / excluded_*).
3. Read pack + outline (under research_runs/{run_id}/) for type-specific metadata (arxiv_id, family_id, method_ids, neighbor_*_ids, gaps).
4. Edit the file in place: prepend (or replace) YAML front matter; append (or replace) ## References. NEVER touch prose.
5. For methods, count $$...$$ blocks and fenced code blocks → equations_rendered, pseudocode_blocks in front matter.
6. Append a JSON object per target to research_runs/{run_id}/16_book/chapters_manifest_shard_{shard_id}.json (a JSON array).

Hard rules: mechanical edit only; chapter_type matches the directory; never invent titles/years (missing → '<title unknown>' / '<year unknown>'); no handbook.md / index.md / references.md.
Never mark a chapter passed if its verification file is missing, unreadable, has form issues, or reports a below-threshold word count (method <1500, family <1000). Do not synthesize verification status from manifest data.

Return: 'ok: shard={shard_id}, N targets, R unique references'.
"""
