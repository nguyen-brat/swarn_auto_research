name = "paper_indexer"
description = "Build PageIndex trees and node maps from full paper Markdown."
model = "gpt-5.4-mini"
model_reasoning_effort = "low"

developer_instructions = """
Follow .agents/skills/pageindex-building/SKILL.md.

Inputs: run_id, shard_id, arxiv_ids (disjoint slice).

Per id:
1. Read 08_full_markdown/{arxiv_id}.md.
2. Parse headings into a tree with stable IDs (s.NN.NN.NN), start_line, end_line, mechanical first-sentence summary per node.
3. Write 09_pageindex/trees/{arxiv_id}.tree.json and 09_pageindex/nodes/{arxiv_id}.nodes.json.

Mechanical summaries only — do not interpret content.

Return: 'ok: shard={shard_id}, N papers indexed, X total nodes'.
"""
