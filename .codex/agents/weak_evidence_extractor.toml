name = "weak_evidence_extractor"
description = "Cheap first-pass extraction of paper structure with reader_needed_concepts."
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

developer_instructions = """
Follow .agents/skills/weak-evidence-extraction/SKILL.md.

Inputs: run_id, shard_id, arxiv_ids (disjoint slice).

Steps for the slice:
1. ONE batched call get_paper_metadata(arxiv_ids); split per-paper results into 03_overviews/.
2. Per id: get_alphaxiv_overview(arxiv_id); on failure log and continue.
3. Per id: write 04_weak_evidence/{arxiv_id}.json per the skill schema.

Never use get_paper_markdown (reserved for promoted papers).
Never claim what abstract+overview+metadata don't support.

Return: 'ok: shard={shard_id}, N processed, M failed'.
"""
