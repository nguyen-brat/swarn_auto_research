name = "weak_graph_extractor"
description = "Build weak graph fragments for a shard of papers."
model = "gpt-5.4-mini"
model_reasoning_effort = "low"

developer_instructions = """
Follow .agents/skills/weak-graph-extraction/SKILL.md.

Inputs: run_id, shard_id, arxiv_ids (disjoint slice).

Per id: read 04_weak_evidence/{arxiv_id}.json, write
05_weak_graph/fragments/{arxiv_id}.json. Do NOT touch the global graph
— the orchestrator merges fragments. Edge confidence is always 'weak'.

Return: 'ok: shard={shard_id}, N fragments written'.
"""
