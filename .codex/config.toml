# Codex project config for swarn_auto_research
# Loaded automatically when running `codex` from this repo root.

[mcp_servers.swarn-auto-research]
command = "uv"
args = ["run", "swarn-auto-research-mcp"]

[mcp_servers.swarn-auto-research.tools.bulk_normal_start_search]
approval_mode = "approve"

[mcp_servers.swarn-auto-research.tools.get_alphaxiv_overview]
approval_mode = "approve"

# MVP budgets (max_seed_papers=50, max_expansion_gaps=5, max_papers_per_gap=3,
# max_expansion_rounds=1, max_promoted_papers=10, min_gap_importance=0.70,
# min_confusion_risk="medium") are documented in
# .agents/skills/auto-research-orchestrator/SKILL.md and not stored in this
# file because Codex parses [agents.X] sub-tables as agent-role definitions.
